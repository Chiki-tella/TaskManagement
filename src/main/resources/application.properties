spring.application.name=TaskManagement

# This is for the Application Login
spring.security.user.name=Ace
spring.security.user.password=munezero

spring.datasource.url=jdbc:postgresql://localhost:5432/taskdb
spring.datasource.username=postgres
spring.datasource.password=Munezero

# Hibernate settings to automatically create tables based on your @Entity
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JSP View Resolver configuration
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# Task Notification Scheduler (Cron Expression)
# Default: 0 0 9 * * * (Every day at 9:00 AM server time)
app.task.notification.cron=0 0 9 * * *
